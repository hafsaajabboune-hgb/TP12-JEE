# ==============================================
# CONFIGURATION BASE DE DONNEES
# DATABASE CONFIGURATION
# ==============================================
spring.datasource.url=jdbc:mysql://localhost:3306/secure_api_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================================
# JPA CONFIGURATION
# ==============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==============================================
# JWT CONFIGURATION
# ==============================================
jwt.secret-key=UHVycGxlU2VjcmV0S2V5Rm9ySldUQXV0aGVudGljYXRpb24yMDI0
jwt.expiration-time=3600000
jwt.refresh-expiration-time=604800000

# ==============================================
# SERVEUR CONFIGURATION
# SERVER CONFIGURATION
# ==============================================
server.port=8085
server.servlet.context-path=/api

# ==============================================
# LOGGING CONFIGURATION
# ==============================================
logging.level.ma.ens.security.jwtapiclean=DEBUG
logging.level.org.springframework.security=INFO